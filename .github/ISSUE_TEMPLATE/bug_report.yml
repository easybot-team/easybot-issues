name: 🐛 报告Bug
description: 感谢您对Easybot的贡献
title: "[BUG] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > 请**务必**提供完整的问题描述和相关日志
        > 已搜索过现有 Issues 避免重复

  - type: dropdown
    id: easybot_version
    attributes:
      label: EasyBot 版本
      description: 请选择您使用的版本
      options:
        - 2.0.0-dev.1
        - 2.0.0-dev.2
        - 2.0.0-dev.3
        - 2.0.0-dev.4
        - 2.0.0-dev.5
        - 2.0.0-dev.6
        - 2.0.0-dev.7
        - 2.0.0-dev.8
        - 2.0.0-dev.9
        - 2.0.0-dev.10
        - 2.0.0-dev.11
        - 2.0.0-dev.12
        - 2.0.0-dev.13
        - 2.0.0-dev.14
        - 2.0.0-dev.15
        - 2.0.0-dev.16
        - 2.0.0-dev.17
        - 2.0.0-dev.18
        - 2.0.0-dev.19
        - 2.0.0-dev.20
        - 2.0.0-dev.21
        - 2.0.0-dev.22
        - 2.0.0-dev.23
        - 2.0.0-dev.24
        - 2.0.0-dev.25
        - 2.0.0
        - 2.0.1
    validations:
      required: true

  - type: dropdown
    id: minecraft_core
    attributes:
      label: Minecraft 核心
      description: 请选择您使用的核心
      options:
        - fabric
        - forge
        - bukkit
        - MCDR
        - Velocity
    validations:
      required: true

  - type: dropdown
    id: mod_version
    attributes:
      label: EasyBot MOD版本
      description: 请选择您使用的版本
      options:
        - 未使用
        - 0.1.0-rc1
        - 0.1.0-rc2
        - 0.1.0-rc3
        - 0.1.0-rc4
        - 0.1.0-rc5
        - 0.1.0-rc6
        - 0.1.0-rc7
        - 0.1.0
        - 0.1.1-rc1
        - 0.1.1
    validations:
      required: false
    visible: ${minecraft_core == 'fabric' || minecraft_core == 'forge'}

  - type: dropdown
    id: bukkit_version
    attributes:
      label: EasyBot BUKKIT版本
      description: 请选择您使用的版本
      options:
        - 未使用
        - 2.0.7
        - 2.0.8
        - 2.0.9
        - 2.1.0
        - 2.1.1
        - 2.1.2
        - 2.1.3
        - 2.1.4
        - 2.1.5
        - 2.2.0
    validations:
      required: false
    visible: ${minecraft_core == 'bukkit'}

  - type: dropdown
    id: mcdr_version
    attributes:
      label: EasyBot MCDR版本
      description: 请选择您使用的版本
      options:
        - 未使用
        - 1.2.1
        - 1.2.0-release.1
        - 1.1.7-release.2
        - 1.1.7-release.1
        - 1.1.7
        - 1.1.6
        - 1.1.5
        - 1.1.4
        - 1.1.3-pre1
        - 1.1.0
    validations:
      required: false
    visible: ${minecraft_core == 'MCDR'}

  - type: dropdown
    id: velocity_version
    attributes:
      label: EasyBot Velocity版本
      description: 请选择您使用的版本
      options:
        - 未使用
        - 1.3.0
        - 1.2.2
        - 1.2.1-SNAPSHOT
        - 1.2.0-SNAPSHOT
        - 1.1
    validations:
      required: false
    visible: ${minecraft_core == 'Velocity'}

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简明地描述问题是什么
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何重现此问题
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 有关问题的任何其他信息

  - type: textarea
    id: logs
    attributes:
      label: 上传日志
      description: 上传有关的日志
    validations:
      required: true
