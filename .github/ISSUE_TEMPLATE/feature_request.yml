name: 💡 功能建议
description: 为Easybot提出您的建议
title: "[FEATURE] "
labels: ["enhancement"]
body:      
  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > 详细描述您的想法和需求
        > 说明此功能能解决什么问题
        
  - type: dropdown
    id: core
    attributes:
      label: 选择模块
      description: 请选择您提出建议的模块
      options:
        - fabric
        - forge
        - bukkit
        - MCDR
        - Velocity
        - 文档相关
        - gihub相关
    validations:
      required: true
      
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰描述您希望的功能
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 此功能解决什么具体问题

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您考虑过的其他方案

  - type: textarea
    id: context
    attributes:
      label: 补充说明
      description: 其他相关信息
